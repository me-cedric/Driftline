name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 0.5.0 or v0.5.0)
        required: true
      sign:
        description: "Code sign the app bundle (requires secrets set up)"
        type: boolean
        default: false
      notarize:
        description: "Notarize and staple the DMG (requires sign=true + secrets)"
        type: boolean
        default: false

jobs:
  package:
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Select latest Xcode
        run: |
          latest=$(ls /Applications | grep -E 'Xcode_[0-9]+\.[0-9]+\.app' | sort -V | tail -1)
          if [ -n "$latest" ]; then
            sudo xcode-select -s "/Applications/$latest"
          fi
          swift --version

      - name: Normalize release version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          app_version="${INPUT_VERSION#v}"
          tag_name="v$app_version"
          echo "DRIFTLINE_VERSION=$app_version" >> "$GITHUB_ENV"
          echo "DRIFTLINE_BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "DRIFTLINE_TAG=$tag_name" >> "$GITHUB_ENV"

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Import code signing certificate
        if: inputs.sign
        env:
          P12_BASE64: ${{ secrets.DRIFTLINE_SIGN_CERT_P12 }}
          P12_PASSWORD: ${{ secrets.DRIFTLINE_SIGN_CERT_PASSWORD }}
        run: |
          # Create a temporary keychain for CI
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import the p12 certificate
          echo "$P12_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$P12_PASSWORD" \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign

          # Set keychain search path and suppress autolock
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"

          # Make the keychain the default for signing
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Set up notarytool keychain profile
        if: inputs.notarize
        env:
          APPLE_ID: ${{ secrets.DRIFTLINE_APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.DRIFTLINE_APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.DRIFTLINE_APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "driftline-ci" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"
          echo "DRIFTLINE_NOTARY_PROFILE=driftline-ci" >> "$GITHUB_ENV"

      - name: Lint
        run: ./scripts/lint.sh

      - name: Test
        run: swift test

      - name: Build and sign app bundle
        env:
          DRIFTLINE_SIGN_IDENTITY: ${{ inputs.sign == 'true' && secrets.DRIFTLINE_SIGN_IDENTITY || '' }}
        run: ./script/build_and_run.sh --verify

      - name: Package DMG
        run: ./scripts/package-dmg.sh

      - name: Notarize and staple DMG
        if: inputs.notarize
        env:
          DRIFTLINE_NOTARY_PROFILE: driftline-ci
        run: ./scripts/notarize.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Driftline-${{ env.DRIFTLINE_VERSION }}
          if-no-files-found: error
          path: |
            dist/Driftline.dmg
            dist/Driftline.dmg.sha256

      - name: Draft GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.DRIFTLINE_TAG }}
          name: Driftline ${{ env.DRIFTLINE_VERSION }}
          draft: true
          files: |
            dist/Driftline.dmg
            dist/Driftline.dmg.sha256
