name: Driftline
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: packaging/config/DriftlineXcode.xcconfig
  Release: packaging/config/DriftlineXcode.xcconfig

packages:
  swift-crypto:
    url: https://github.com/apple/swift-crypto.git
    exactVersion: 3.15.1
  swift-nio:
    url: https://github.com/apple/swift-nio.git
    minVersion: 2.80.0
    maxVersion: 2.98.0
  swift-nio-ssh:
    url: https://github.com/apple/swift-nio-ssh.git
    exactVersion: 0.11.0

settings:
  base:
    SWIFT_VERSION: 5.10
    MACOSX_DEPLOYMENT_TARGET: 14.0
    MARKETING_VERSION: 0.6.0
    CURRENT_PROJECT_VERSION: 7

targets:
  DriftlineCore:
    type: framework
    platform: macOS
    sources:
      - Sources/DriftlineCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.driftline.Driftline.Core
        PRODUCT_MODULE_NAME: DriftlineCore
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
    dependencies:
      - package: swift-crypto
        product: Crypto
      - package: swift-nio
        product: NIOCore
      - package: swift-nio
        product: NIOPosix
      - package: swift-nio-ssh
        product: NIOSSH

  DriftlineMCP:
    type: framework
    platform: macOS
    sources:
      - Sources/DriftlineMCP
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.driftline.Driftline.MCP
        PRODUCT_MODULE_NAME: DriftlineMCP
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
    dependencies:
      - target: DriftlineCore
      - package: swift-nio
        product: NIOHTTP1
      - package: swift-nio
        product: NIOCore
      - package: swift-nio
        product: NIOPosix

  DriftlineWidget:
    type: framework
    platform: macOS
    sources:
      - Sources/DriftlineWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.driftline.Driftline.WidgetSupport
        PRODUCT_MODULE_NAME: DriftlineWidget
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
    dependencies:
      - target: DriftlineCore
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework

  DriftlineWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - Sources/DriftlineWidgetExtension
    settings:
      base:
        INFOPLIST_FILE: packaging/widget/DriftlineWidget-Info.plist
        CODE_SIGN_ENTITLEMENTS: packaging/entitlements/DriftlineWidget.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: $(DRIFTLINE_WIDGET_BUNDLE_IDENTIFIER)
        PRODUCT_NAME: DriftlineWidget
        PRODUCT_MODULE_NAME: DriftlineWidgetExtension
        APPLICATION_EXTENSION_API_ONLY: YES
    dependencies:
      - target: DriftlineWidget
        embed: true
      - target: DriftlineCore
        embed: true
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework

  Driftline:
    type: application
    platform: macOS
    sources:
      - Sources/DriftlineApp
      - path: assets/Driftline.icns
        buildPhase: resources
      - path: assets/DriftlineDark.icns
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: packaging/app/Driftline-Info.plist
        CODE_SIGN_ENTITLEMENTS: packaging/entitlements/Driftline.entitlements
        PRODUCT_MODULE_NAME: DriftlineApp
        PRODUCT_NAME: Driftline
    dependencies:
      - target: DriftlineCore
      - target: DriftlineMCP
      - target: DriftlineWidgetExtension
      - sdk: AppKit.framework
      - sdk: SwiftUI.framework

  DriftlineCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/DriftlineCoreTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.driftline.Driftline.CoreTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Driftline.app/Contents/MacOS/Driftline
        BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: DriftlineCore
      - target: Driftline
      - package: swift-crypto
        product: Crypto

  DriftlineMCPTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/DriftlineMCPTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.driftline.Driftline.MCPTests
    dependencies:
      - target: DriftlineCore
      - target: DriftlineMCP

schemes:
  Driftline:
    build:
      targets:
        Driftline: all
        DriftlineWidgetExtension: all
    test:
      targets:
        - DriftlineCoreTests
        - DriftlineMCPTests
  DriftlineWidgetExtension:
    build:
      targets:
        DriftlineWidgetExtension: all
  DriftlineCoreTests:
    build:
      targets:
        DriftlineCoreTests: test
    test:
      targets:
        - DriftlineCoreTests
  DriftlineMCPTests:
    build:
      targets:
        DriftlineMCPTests: test
    test:
      targets:
        - DriftlineMCPTests
