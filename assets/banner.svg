<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-label="Driftline banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12232B"/>
      <stop offset="1" stop-color="#091215"/>
    </linearGradient>
    <linearGradient id="panelGradL" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1D3840"/>
      <stop offset="1" stop-color="#162930"/>
    </linearGradient>
    <linearGradient id="panelGradR" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1D3840"/>
      <stop offset="1" stop-color="#162930"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".4"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="420" rx="32" fill="url(#bg)"/>

  <!-- Subtle radial highlight -->
  <ellipse cx="640" cy="210" rx="600" ry="300" fill="#1D3840" opacity="0.08"/>

  <!-- Left panel -->
  <g filter="url(#shadow)">
    <rect x="92" y="86" width="330" height="230" rx="22" fill="url(#panelGradL)" stroke="#5ED5C8" stroke-width="2.5" stroke-opacity=".5"/>
    <!-- File items in left panel -->
    <rect x="116" y="110" width="60" height="14" rx="4" fill="#F6B44B" opacity="0.6"/>
    <rect x="186" y="110" width="120" height="14" rx="4" fill="#B7C6CC" opacity="0.4"/>
    <rect x="116" y="136" width="80" height="14" rx="4" fill="#5ED5C8" opacity="0.5"/>
    <rect x="206" y="136" width="100" height="14" rx="4" fill="#B7C6CC" opacity="0.4"/>
    <rect x="116" y="162" width="45" height="14" rx="4" fill="#F6B44B" opacity="0.6"/>
    <rect x="171" y="162" width="135" height="14" rx="4" fill="#B7C6CC" opacity="0.4"/>
  </g>

  <!-- Right panel -->
  <g filter="url(#shadow)">
    <rect x="858" y="86" width="330" height="230" rx="22" fill="url(#panelGradR)" stroke="#5ED5C8" stroke-width="2.5" stroke-opacity=".5"/>
    <!-- File items in right panel -->
    <rect x="882" y="110" width="70" height="14" rx="4" fill="#5ED5C8" opacity="0.5"/>
    <rect x="962" y="110" width="110" height="14" rx="4" fill="#B7C6CC" opacity="0.4"/>
    <rect x="882" y="136" width="55" height="14" rx="4" fill="#F6B44B" opacity="0.6"/>
    <rect x="947" y="136" width="125" height="14" rx="4" fill="#B7C6CC" opacity="0.4"/>
  </g>

  <!-- Transfer arc with glow -->
  <g filter="url(#glow)">
    <path d="M422 201 C540 95 740 307 858 201" fill="none" stroke="#5ED5C8" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Endpoint circles -->
  <circle cx="422" cy="201" r="16" fill="#F6B44B" stroke="#101820" stroke-width="3"/>
  <circle cx="858" cy="201" r="16" fill="#5ED5C8" stroke="#101820" stroke-width="3"/>

  <!-- Transfer direction arrow -->
  <path d="M645 195 L655 201 L645 207" fill="none" stroke="#5ED5C8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Title -->
  <text x="92" y="375" fill="#F8FBFC" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Helvetica Neue, sans-serif" font-size="54" font-weight="700" letter-spacing="-0.5">Driftline</text>
  <text x="370" y="375" fill="#A0B4BC" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Helvetica Neue, sans-serif" font-size="26" font-weight="400" letter-spacing="0.2">Native file transfer, calmly secure.</text>
</svg>
