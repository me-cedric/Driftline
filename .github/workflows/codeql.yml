name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 2 * * 1"

jobs:
  analyze:
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Select latest Xcode
        run: |
          latest=$(ls /Applications | grep -E 'Xcode_[0-9]+\.[0-9]+\.app' | sort -V | tail -1)
          if [ -n "$latest" ]; then
            sudo xcode-select -s "/Applications/$latest"
          fi
          swift --version

      - uses: github/codeql-action/init@v4
        with:
          languages: swift
          queries: security-extended

      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
